<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store - Iniciar Sesión</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body class="login-body">
    <div class="login-container">
      <div class="login-card">
        <div class="login-logo">
          <span class="logo-icon">🍔</span>
          <h1>Food Store</h1>
        </div>
        <h2>Iniciar Sesión</h2>

        <div id="error-message" class="error-message hidden">
          Email o contraseña incorrectos
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="ejemplo@correo.com"
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            type="password"
            id="password"
            placeholder="Ingresá tu contraseña"
            autocomplete="current-password"
          />
        </div>

        <button id="btn-login" class="btn-primary btn-full">Ingresar</button>

        <div class="registro-link">
           <p>¿No tenés cuenta? 
             <a href="/src/pages/auth/register/register.html">Registrate aquí</a>
           </p>
        </div>

        <div class="login-cuentas">
          <p>Cuentas de prueba:</p>
          <p>Admin: admin@admin.com / 123456</p>
          <p>Cliente: cliente@food.com / cliente123</p>
        </div>
      </div>
    </div>
    <script type="module" src="login.ts"></script>
  </body>
</html>
