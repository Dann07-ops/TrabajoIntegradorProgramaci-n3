<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store - Registro</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link rel="stylesheet" href="register.css" />
  </head>
  <body class="register-body">
    <div class="register-container">
      <div class="register-card">
        <div class="register-logo">
          <span class="logo-icon">🍔</span>
          <h1>Food Store</h1>
        </div>
        <h2>Crear Cuenta</h2>

        <div id="error-message" class="error-message hidden"></div>
        <div id="success-message" class="success-message hidden"></div>

        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Tu nombre" />
        </div>

        <div class="form-group">
          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" placeholder="Tu apellido" />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="ejemplo@correo.com" />
        </div>

        <div class="form-group">
          <label for="celular">Celular (opcional)</label>
          <input type="text" id="celular" placeholder="Tu número de celular" />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="Mínimo 6 caracteres" />
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirmar Contraseña</label>
          <input type="password" id="confirm-password" 
                 placeholder="Repetí tu contraseña" />
        </div>

        <button id="btn-registrar" class="btn-primary btn-full">
          Crear Cuenta
        </button>

        <div class="login-link">
          <p>¿Ya tenés cuenta? 
            <a href="/src/pages/auth/login/login.html">Iniciá sesión</a>
          </p>
        </div>
      </div>
    </div>
    <script type="module" src="register.ts"></script>
  </body>
</html>
