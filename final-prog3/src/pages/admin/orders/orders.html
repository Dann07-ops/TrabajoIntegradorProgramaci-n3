<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store - Gestión de Pedidos</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link rel="stylesheet" href="orders.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="navbar-brand">🍔 Food Store</div>
      <div class="navbar-links">
        <a href="/src/pages/store/home/home.html">Tienda</a>
        <a href="../adminHome/adminHome.html">Panel Admin</a>
        <span id="usuario-nombre"></span>
        <button id="btn-cerrar-sesion" class="btn-secondary">
          Cerrar Sesión
        </button>
      </div>
    </nav>

    <div class="admin-layout">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <p class="sidebar-title">Administración</p>
        <p class="sidebar-subtitle">Panel de control</p>
        <nav class="sidebar-nav">
          <a href="../adminHome/adminHome.html" class="sidebar-link">Dashboard</a>
          <a href="../categories/categories.html" class="sidebar-link">Categorías</a>
          <a href="../products/products.html" class="sidebar-link">Productos</a>
          <a href="orders.html" class="sidebar-link active">Pedidos</a>
          <a href="/src/pages/store/home/home.html" class="sidebar-link">Ver Tienda</a>
        </nav>
      </aside>

      <!-- CONTENIDO PRINCIPAL -->
      <main class="admin-main">
        <div class="main-header">
          <h2>Gestión de Pedidos</h2>
          <select id="filtro-estado" class="filtro-select">
            <option value="todos">Todos los pedidos</option>
            <option value="pending">Pendiente</option>
            <option value="processing">En Preparación</option>
            <option value="completed">Entregado</option>
            <option value="cancelled">Cancelado</option>
          </select>
        </div>

        <div id="lista-pedidos" class="lista-pedidos"></div>
      </main>
    </div>

    <!-- MODAL CAMBIAR ESTADO -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modal-titulo">Cambiar Estado del Pedido</h3>
          <button id="btn-cerrar-modal" class="btn-cerrar-modal">✕</button>
        </div>
        <div class="modal-contenido">
          <p id="modal-info" class="modal-info"></p>
          <div class="form-group">
            <label for="select-estado">Nuevo Estado</label>
            <select id="select-estado" class="filtro-select" style="width:100%">
              <option value="pending">⏳ Pendiente</option>
              <option value="processing">🍳 En Preparación</option>
              <option value="completed">✅ Entregado</option>
              <option value="cancelled">❌ Cancelado</option>
            </select>
          </div>
          <div class="modal-acciones">
            <button id="btn-cancelar" class="btn-secondary">Cancelar</button>
            <button id="btn-guardar-estado" class="btn-primary">
              Guardar Estado
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="orders.ts"></script>
  </body>
</html>
