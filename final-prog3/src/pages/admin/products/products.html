<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Store - Gestión de Productos</title>
    <link rel="stylesheet" href="../../../style.css" />
    <link rel="stylesheet" href="products.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="navbar-brand">🍔 Food Store</div>
      <div class="navbar-links">
        <a href="/src/pages/store/home/home.html">Tienda</a>
        <a href="../adminHome/adminHome.html">Panel Admin</a>
        <span id="usuario-nombre"></span>
        <button id="btn-cerrar-sesion" class="btn-secondary">
          Cerrar Sesión
        </button>
      </div>
    </nav>

    <div class="admin-layout">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <p class="sidebar-title">Administración</p>
        <p class="sidebar-subtitle">Panel de control</p>
        <nav class="sidebar-nav">
          <a href="../adminHome/adminHome.html" class="sidebar-link">Dashboard</a>
          <a href="../categories/categories.html" class="sidebar-link">Categorías</a>
          <a href="products.html" class="sidebar-link active">Productos</a>
          <a href="../orders/orders.html" class="sidebar-link">Pedidos</a>
          <a href="/src/pages/store/home/home.html" class="sidebar-link">Ver Tienda</a>
        </nav>
      </aside>

      <!-- CONTENIDO PRINCIPAL -->
      <main class="admin-main">
        <div class="main-header">
          <h2>Gestión de Productos</h2>
          <button id="btn-nuevo-producto" class="btn-primary">
            + Nuevo Producto
          </button>
        </div>

        <div class="tabla-container">
          <table class="tabla">
            <thead>
              <tr>
                <th>ID</th>
                <th>Imagen</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Categoría</th>
                <th>Stock</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-productos"></tbody>
          </table>
        </div>
      </main>
    </div>

    <!-- MODAL NUEVO/EDITAR PRODUCTO -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modal-titulo">Nuevo Producto</h3>
          <button id="btn-cerrar-modal" class="btn-cerrar-modal">✕</button>
        </div>
        <div class="modal-contenido">
          <div class="form-group">
            <label for="input-nombre">Nombre</label>
            <input type="text" id="input-nombre" placeholder="Nombre del producto" />
          </div>
          <div class="form-group">
            <label for="input-descripcion">Descripción</label>
            <input type="text" id="input-descripcion" placeholder="Descripción" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="input-precio">Precio</label>
              <input type="number" id="input-precio" placeholder="0" min="0" />
            </div>
            <div class="form-group">
              <label for="input-stock">Stock</label>
              <input type="number" id="input-stock" placeholder="0" min="0" />
            </div>
          </div>
          <div class="form-group">
            <label for="input-categoria">Categoría</label>
            <select id="input-categoria"></select>
          </div>
          <div class="form-group">
            <label for="input-imagen">Imagen (URL)</label>
            <input type="text" id="input-imagen" placeholder="https://..." />
          </div>
          <div class="form-group">
            <label for="input-disponible">Disponible</label>
            <select id="input-disponible">
              <option value="true">Sí</option>
              <option value="false">No</option>
            </select>
          </div>
          <div id="modal-error" class="error-message hidden"></div>
          <div class="modal-acciones">
            <button id="btn-cancelar" class="btn-secondary">Cancelar</button>
            <button id="btn-guardar" class="btn-primary">Guardar</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="products.ts"></script>
  </body>
</html>
